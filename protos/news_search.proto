syntax = "proto3";

package news_search;

// El servicio de búsqueda
// Una función RPC que toma un SearchRequest y devuelve un SearchResponse
service NewsSearchService {
  rpc SearchByDescriptor(SearchRequest) returns (SearchResponse) {}
}

// La petición recibe el descriptor (palabra clave a buscar)
message SearchRequest {
  string descriptor = 1;
}

// Representa una noticia individual mapeada desde la base de datos
message NewsItem {
  int32 news_id = 1;
  string title = 2;
  int32 user_id = 3;
  int32 category_id = 4;
  string content = 5;
  string created_at = 6;
}

// La respuesta del servidor es una lista de noticias que coincidieron
// La palabra reservada 'repeated' significa que será una lista (array) de NewsItems
message SearchResponse {
  repeated NewsItem news = 1;
}
