services:
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: database
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d database"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      app-network:
        aliases:
          - db
          - postgres

  area-manager:
    build:
      context: ./area-manager
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: database
    ports:
      - "8080:8080"
    networks:
      - app-network

  find-news-period:
    build:
      context: ./find-news-period
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: database
    ports:
      - "8010:8000"
    networks:
      - app-network

  get-news-load-by-area:
    build:
      context: ./get-news-load-by-area
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: database
    ports:
      - "8011:8000"
    networks:
      - app-network

  last-news-24-hour:
    build:
      context: ./last-news-24-hour
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
      find-news-period:
        condition: service_started
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: database
      FIND_NEWS_PERIOD_URL: http://find-news-period:8000/api/news-period
    ports:
      - "8012:8000"
    networks:
      - app-network

  delete-news:
    build:
      context: ./delete-news
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: database
    ports:
      - "8013:8000"
    networks:
      - app-network

  find-news-by-descriptor:
    build:
      context: ./find-news-by-descriptor
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: database
    ports:
      - "50051:50051"
    networks:
      - app-network

  servicio_envio_noticias:
    build:
      context: ./servicio_envio_noticias
      dockerfile: Dockerfile
    ports:
      - "50052:50051"
    environment:
      PYTHONUNBUFFERED: 1
    networks:
      - app-network

networks:
  app-network: