version: '3.8'

services:
  news-search:
    build: .
    image: news-search-service:1.0
    ports:
      - "50051:50051"
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    networks:
      - consorcio-red

networks:
  consorcio-red:
    external: true
